<svg width="400" height="800" viewBox="0 0 400 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Dynamic Background linked to CSS variables -->
  <rect width="400" height="800" fill="var(--bg)" rx="40"/>
  
  <!-- Header -->
  <text x="200" y="80" font-family="serif" font-size="14" fill="var(--accent)" letter-spacing="4" text-anchor="middle">HAIKU</text>
  <text x="200" y="110" font-family="serif" font-size="12" fill="var(--text-main)" text-anchor="middle">MARCH 22</text>

  <!-- Main Clock Dial -->
  <g transform="translate(200, 320)">
    <!-- Concentric Tracks -->
    <circle r="160" fill="none" stroke="var(--field-bg)" stroke-width="20"/>
    <circle r="136" fill="none" stroke="var(--field-bg)" stroke-width="20" opacity="0.6"/>
    
    <!-- Neumorphic Face -->
    <circle r="115" fill="var(--bg)"/>
    <circle r="115" fill="none" stroke="var(--shadow-dark)" stroke-width="4" style="transform: translate(6px, 6px); filter: blur(4px);"/>
    <circle r="115" fill="none" stroke="var(--shadow-light)" stroke-width="4" style="transform: translate(-6px, -6px); filter: blur(4px);"/>

    <!-- Active Task Arcs (The Zen Flow) -->
    <path d="M 0 -160 A 160 160 0 0 1 138 -80" fill="none" stroke="var(--accent)" stroke-width="20" stroke-linecap="round"/>
    <path d="M -136 0 A 136 136 0 0 1 0 -136" fill="none" stroke="var(--accent)" stroke-width="20" stroke-linecap="round" opacity="0.7"/>

    <!-- Clock Hands -->
    <line x1="0" y1="0" x2="40" y2="-60" stroke="var(--text-main)" stroke-width="6" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="0" y2="-90" stroke="var(--text-main)" stroke-width="4" stroke-linecap="round"/>
    <circle r="6" fill="var(--accent)"/>

    <text x="0" y="-10" font-family="sans-serif" font-size="24" font-weight="bold" fill="var(--accent)" text-anchor="middle">45m</text>
    <text x="0" y="15" font-family="serif" font-size="12" fill="var(--text-main)" opacity="0.8" text-anchor="middle">Flow State</text>
  </g>

  <!-- Bottom Card -->
  <path d="M 0 520 Q 200 500 400 520 L 400 800 L 0 800 Z" fill="var(--field-bg)"/>
  
  <!-- Task Item 1 -->
  <g transform="translate(40, 570)">
    <rect width="320" height="60" rx="20" fill="var(--bg)"/>
    <circle cx="30" cy="30" r="12" fill="var(--accent)"/>
    <rect x="55" y="20" width="140" height="8" rx="4" fill="var(--text-main)" opacity="0.9"/>
    <rect x="55" y="35" width="80" height="6" rx="3" fill="var(--text-main)" opacity="0.4"/>
  </g>

  <!-- Task Item 2 -->
  <g transform="translate(40, 640)">
    <rect width="320" height="60" rx="20" fill="var(--bg)"/>
    <circle cx="30" cy="30" r="12" fill="var(--text-muted)"/>
    <rect x="55" y="20" width="120" height="8" rx="4" fill="var(--text-main)" opacity="0.9"/>
    <rect x="55" y="35" width="60" height="6" rx="3" fill="var(--text-main)" opacity="0.4"/>
  </g>
</svg>