<svg width="400" height="800" viewBox="0 0 400 800" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="800" fill="var(--bg)" rx="40"/>
  
  <text x="200" y="100" font-family="var(--font-serif)" font-size="24" fill="var(--accent)" text-anchor="middle" letter-spacing="4">INSIGHTS</text>

  <!-- Summary Cards -->
  <g transform="translate(30, 150)">
    <rect width="160" height="100" rx="20" fill="var(--field-bg)"/>
    <text x="20" y="40" font-family="sans-serif" font-size="12" fill="var(--text-muted)">Total Time</text>
    <text x="20" y="75" font-family="sans-serif" font-size="24" font-weight="bold" fill="var(--text-main)">44.7h</text>
  </g>

  <g transform="translate(210, 150)">
    <rect width="160" height="100" rx="20" fill="var(--field-bg)"/>
    <text x="20" y="40" font-family="sans-serif" font-size="12" fill="var(--text-muted)">Top Activity</text>
    <text x="20" y="75" font-family="sans-serif" font-size="20" font-weight="bold" fill="var(--text-main)">Deep Work</text>
  </g>

  <!-- Peak Focus Window -->
  <g transform="translate(30, 280)">
    <text x="0" y="20" font-family="var(--font-serif)" font-size="14" fill="var(--accent)" letter-spacing="1">PEAK FOCUS WINDOW</text>
    <text x="0" y="45" font-family="sans-serif" font-size="18" font-weight="bold" fill="var(--text-main)">Your rhythm peaks at 4 PM</text>
    
    <rect y="70" width="340" height="180" rx="20" fill="var(--field-bg)"/>
    <!-- Bars -->
    <g transform="translate(20, 230)">
      <rect x="0" y="-40" width="10" height="40" fill="var(--accent)" opacity="0.3"/>
      <rect x="20" y="-60" width="10" height="60" fill="var(--accent)" opacity="0.3"/>
      <rect x="40" y="-30" width="10" height="30" fill="var(--accent)" opacity="0.3"/>
      <rect x="100" y="-100" width="15" height="100" fill="var(--accent)"/>
      <rect x="125" y="-70" width="15" height="70" fill="var(--accent)"/>
      <rect x="150" y="-90" width="15" height="90" fill="var(--accent)"/>
      <rect x="175" y="-120" width="15" height="120" fill="var(--accent)"/>
      <rect x="200" y="-80" width="15" height="80" fill="var(--accent)"/>
    </g>
  </g>

  <!-- Focus Momentum -->
  <g transform="translate(30, 550)">
    <text x="0" y="20" font-family="var(--font-serif)" font-size="14" fill="var(--accent)" letter-spacing="1">FOCUS MOMENTUM</text>
    <rect y="40" width="340" height="180" rx="20" fill="var(--field-bg)"/>
    <!-- Line Graph -->
    <path d="M 40 180 L 100 100 L 150 140 L 200 80 L 250 180 L 300 180" fill="none" stroke="var(--accent)" stroke-width="4" stroke-linejoin="round" transform="translate(0, 40)"/>
  </g>
</svg>